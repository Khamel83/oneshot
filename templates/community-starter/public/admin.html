<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Admin — Your Site</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">

    <style>
        .main { padding-top: 80px; }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-white);
        }

        @media (max-width: 600px) {
            .table-card { overflow-x: auto; }
            .table-card table { min-width: 500px; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a href="/" class="site-logo">your site</a>
            <nav class="site-nav">
                <a href="/dashboard" class="nav-link" id="navDashboard">Dashboard</a>
                <a href="/admin" class="nav-link" id="navAdmin">Admin</a>
            </nav>
            <div class="site-auth">
                <button class="btn btn-sm btn-outline" id="signOutBtn">Sign out</button>
            </div>
        </div>
    </header>

    <div class="main">
        <h3 class="section-title">Members</h3>
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="membersTable">
                    <tr><td colspan="5" class="text-muted">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { loadConfig, getSiteName } from '/config.js';
        import { getSite, requireAdmin, signOut, authFetch, handleUnauthorized, api, page } from '/js/auth.js';

        if (!requireAdmin()) throw new Error('not admin');

        const site = getSite();

        await loadConfig();
        const name = getSiteName();
        if (name) document.title = `${name} — Admin`;

        document.querySelector('.site-logo').textContent = name ? name.toLowerCase() : 'your site';
        document.querySelector('.site-logo').href = site ? `/${site}` : '/';
        document.getElementById('navDashboard').href = page('dashboard');
        document.getElementById('navAdmin').href = page('admin');

        document.getElementById('signOutBtn').addEventListener('click', signOut);

        async function loadMembers() {
            const res = await authFetch(api('admin?action=members'));
            if (handleUnauthorized(res)) return;
            const data = await res.json();
            renderMembers(data.members || []);
        }

        function renderMembers(members) {
            const tbody = document.getElementById('membersTable');
            if (!members.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-muted">No members found.</td></tr>';
                return;
            }
            tbody.innerHTML = members.map(m => `
                <tr>
                    <td>${escapeHtml(m.name)}</td>
                    <td>${escapeHtml(m.email)}</td>
                    <td>
                        <span class="badge ${m.is_admin ? 'badge-admin' : 'badge-member'}">
                            ${m.is_admin ? 'Admin' : 'Member'}
                        </span>
                    </td>
                    <td>${new Date(m.joined_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-sm btn-outline" onclick="toggleAdmin('${m.user_id}', ${!m.is_admin})">
                            ${m.is_admin ? 'Remove admin' : 'Make admin'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        window.toggleAdmin = async (userId, newValue) => {
            const res = await authFetch(api('admin'), {
                method: 'POST',
                body: JSON.stringify({ action: 'set_admin', user_id: userId, is_admin: newValue }),
            });
            if (handleUnauthorized(res)) return;
            loadMembers();
        };

        function escapeHtml(str) {
            const el = document.createElement('div');
            el.textContent = str;
            return el.innerHTML;
        }

        loadMembers();
    </script>
</body>
</html>
