<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Dashboard — Your Site</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">

    <style>
        .main { padding-top: 80px; }

        .welcome-card {
            margin-bottom: 2rem;
        }

        .welcome-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .welcome-card p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-white);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a href="/" class="site-logo">your site</a>
            <nav class="site-nav">
                <a href="/dashboard" class="nav-link" id="navDashboard">Dashboard</a>
            </nav>
            <div class="site-auth">
                <a href="/admin" class="btn btn-sm btn-outline" id="adminLink" style="display:none">Admin</a>
                <button class="btn btn-sm btn-outline" id="signOutBtn">Sign out</button>
            </div>
        </div>
    </header>

    <div class="main">
        <div class="card welcome-card">
            <h2 id="greeting">Welcome back!</h2>
            <p id="memberEmail"></p>
        </div>

        <h3 class="section-title">Members</h3>
        <div id="membersGrid" class="members-grid">
            <p class="text-muted">Loading...</p>
        </div>
    </div>

    <script type="module">
        import { loadConfig, getSiteName } from '/config.js';
        import { getSite, requireAuth, getMember, isAdmin, signOut, authFetch, handleUnauthorized, api, page } from '/js/auth.js';

        if (!requireAuth()) throw new Error('not authenticated');

        const site = getSite();
        const member = getMember();

        await loadConfig();
        const name = getSiteName();
        if (name) document.title = `${name} — Dashboard`;

        // Update nav links for multi-tenant
        document.querySelector('.site-logo').textContent = name ? name.toLowerCase() : 'your site';
        document.getElementById('navDashboard').href = page('dashboard');
        document.querySelector('.site-logo').href = site ? `/${site}` : '/';

        if (isAdmin()) {
            const adminLink = document.getElementById('adminLink');
            adminLink.style.display = '';
            adminLink.href = page('admin');
        }

        document.getElementById('greeting').textContent = `Welcome back, ${member.name || 'friend'}!`;
        document.getElementById('memberEmail').textContent = member.email || '';

        document.getElementById('signOutBtn').addEventListener('click', signOut);

        async function loadMembers() {
            try {
                const res = await authFetch(api('members'));
                if (handleUnauthorized(res)) return;
                const data = await res.json();
                renderMembers(data.members || []);
            } catch (err) {
                document.getElementById('membersGrid').innerHTML = '<p style="color:var(--error)">Failed to load members.</p>';
            }
        }

        function renderMembers(members) {
            const grid = document.getElementById('membersGrid');
            if (!members.length) {
                grid.innerHTML = '<p class="text-muted">No members yet.</p>';
                return;
            }
            grid.innerHTML = members.map(m => `
                <div class="member-card">
                    <img src="${m.avatar_url || '/js/default-avatar.svg'}" alt="${escapeHtml(m.name)}" onerror="this.src='/js/default-avatar.svg'">
                    <div class="name">${escapeHtml(m.name)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            const el = document.createElement('div');
            el.textContent = str;
            return el.innerHTML;
        }

        loadMembers();
    </script>
</body>
</html>
