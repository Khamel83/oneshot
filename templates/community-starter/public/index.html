<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your App</title>
    <style>
        :root {
            --color-primary: #4f46e5;
            --color-bg: #f9fafb;
            --color-text: #111827;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--color-bg); color: var(--color-text); }
        .hero { text-align: center; padding: 5rem 2rem; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem; }
        p { color: #6b7280; font-size: 1.125rem; margin-bottom: 2rem; }
        .cta { display: inline-flex; gap: 1rem; }
        a.btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
        }
        a.btn-primary { background: var(--color-primary); color: white; }
        a.btn-secondary { background: white; color: var(--color-text); border: 1px solid #d1d5db; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Your Community</h1>
        <p>A private space for your group. Sign in to get started.</p>
        <div class="cta" id="ctaButtons">
            <a href="/login" class="btn btn-primary">Sign In</a>
            <a href="/signup" class="btn btn-secondary">Join</a>
        </div>
    </div>

    <script type="module">
        import { isLoggedIn } from '/js/auth.js';
        // Already logged in — swap buttons to go to dashboard
        if (isLoggedIn()) {
            document.getElementById('ctaButtons').innerHTML =
                '<a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>';
        }
    </script>
</body>
</html>
