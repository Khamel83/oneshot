<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Sign In — Your Site</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="/" class="back-link" id="backLink">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </a>

            <div class="auth-card">
                <div class="auth-header">
                    <h1 class="site-logo" id="logoText">your site</h1>
                    <p id="formSubtitle">Log in to your account</p>
                </div>

                <div id="errorMsg" class="msg-error"></div>

                <form id="authForm">
                    <div class="form-group" id="nameGroup" style="display:none">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;padding:1rem;font-size:1rem;">
                        Sign In
                    </button>
                </form>

                <div class="auth-footer" id="authFooter">
                    <p><a href="#" id="toggleLink">Need to create an account?</a></p>
                    <p><a href="/reset-password">Forgot your password?</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadConfig, getSiteName } from '/config.js';
        import { getSite, isLoggedIn, saveSession, api, page } from '/js/auth.js';

        const site = getSite();

        // Already logged in → go to dashboard
        if (isLoggedIn()) {
            window.location.href = page('dashboard');
            throw new Error('redirecting');
        }

        await loadConfig();
        const name = getSiteName();
        if (name) {
            document.getElementById('logoText').textContent = name.toLowerCase();
            document.title = `${name} — Sign In`;
        }
        if (site) document.getElementById('backLink').href = `/${site}`;

        // Signup mode via URL param
        const params = new URLSearchParams(window.location.search);
        let isSignup = params.get('mode') === 'signup';

        function toggleMode() {
            isSignup = !isSignup;
            const nameGroup = document.getElementById('nameGroup');
            const subtitle = document.getElementById('formSubtitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleLink = document.getElementById('toggleLink');

            if (isSignup) {
                nameGroup.style.display = '';
                subtitle.textContent = 'Create your account';
                submitBtn.textContent = 'Create Account';
                toggleLink.textContent = 'Already have an account? Sign in';
            } else {
                nameGroup.style.display = 'none';
                subtitle.textContent = 'Log in to your account';
                submitBtn.textContent = 'Sign In';
                toggleLink.textContent = 'Need to create an account?';
            }
        }

        document.getElementById('toggleLink').addEventListener('click', (e) => {
            e.preventDefault();
            toggleMode();
        });

        // Auto-switch to signup if ?mode=signup
        if (isSignup) toggleMode();

        const form = document.getElementById('authForm');
        const errorEl = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.className = 'msg-error';
            submitBtn.disabled = true;
            submitBtn.textContent = isSignup ? 'Creating account...' : 'Signing in...';

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const nameVal = document.getElementById('name').value.trim();

            if (isSignup && !nameVal) {
                showError('Name is required');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
                return;
            }

            const action = isSignup ? 'signup' : 'login';
            const body = { action, email, password };
            if (isSignup) body.name = nameVal;

            try {
                const res = await fetch(api('auth'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (data.success) {
                    if (data.token) {
                        saveSession(data.token, data.member || {});
                    }
                    window.location.href = page('dashboard');
                } else {
                    showError(data.error || (isSignup ? 'Signup failed' : 'Invalid email or password'));
                    submitBtn.disabled = false;
                    submitBtn.textContent = isSignup ? 'Create Account' : 'Sign In';
                }
            } catch (err) {
                showError('Connection error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = isSignup ? 'Create Account' : 'Sign In';
            }
        });

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.className = 'msg-error show';
        }
    </script>
</body>
</html>
