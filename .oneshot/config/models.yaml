# Delegation Harness — provider, lane, and runner configuration.
#
# This is a separate routing layer from config/lanes.yaml (which powers the
# /short, /full, /conduct skills). Don't merge them yet.
#
# Lifecycle:
#   - "current_*" fields point to the active provider/model used today.
#   - "future_*"  fields point to where a lane will move once OpenCode Go is enabled.
#   - To migrate a lane, change current_provider/current_model — runner_templates stay put.

providers:
  zai:
    enabled: true
    kind: cli_or_proxy
    description: "Active GLM coding plan provider. Routed via OpenCode by default; claude-CLI fallback available."
    auth_env: ZAI_API_KEY     # name only, never rendered into worker.log
    notes:
      - "Plan expires 2026-05-02. Migrate lanes to opencode_go before then."
    models:
      glm_4_5_air:   { id: "glm-4.5-air",   role: cheap_fast }
      glm_5_1:       { id: "glm-5.1",       role: routine_coder }
      glm_5_turbo:   { id: "glm-5-turbo",   role: strong_reasoning }

  opencode_go:
    enabled: true
    kind: model_gateway
    description: "Model gateway. Not limited to OpenCode CLI — standard API endpoints."
    auth_env: OPENCODE_GO_API_KEY
    endpoints:
      openai: "https://opencode.ai/zen/go/v1/chat/completions"    # GLM, Kimi, DeepSeek, MiMo, Qwen
      anthropic: "https://opencode.ai/zen/go/v1/messages"          # MiniMax M2.5, M2.7 only
      models: "https://opencode.ai/zen/go/v1/models"               # dynamic model list
    pricing:
      subscription: "$5 first month, $10/month"
      limits: "$12/5h, $30/week, $60/month (dollar-based, varies by model)"
    notes:
      - "Claude CLI path only works with MiniMax models (Anthropic-compatible endpoint)."
      - "Other models need OpenCode CLI or direct API (OpenAI-compatible)."
      - "Zero data retention. Models hosted US/EU/Singapore."
    models:
      deepseek_v4_flash: { id: "deepseek-v4-flash", protocol: openai,    role: cheap_fast }
      qwen_3_5_plus:     { id: "qwen3.5-plus",     protocol: openai,    role: cheap_fast }
      qwen_3_6_plus:     { id: "qwen3.6-plus",     protocol: openai,    role: cheap_summary }
      minimax_m2_5:      { id: "minimax-m2.5",     protocol: anthropic, role: routine_coder }
      minimax_m2_7:      { id: "minimax-m2.7",     protocol: anthropic, role: routine_coder }
      kimi_k2_5:         { id: "kimi-k2.5",        protocol: openai,    role: strong_reasoning }
      kimi_k2_6:         { id: "kimi-k2.6",        protocol: openai,    role: strong_reasoning }
      deepseek_v4_pro:   { id: "deepseek-v4-pro",   protocol: openai,    role: strong_reasoning }
      glm_5:             { id: "glm-5",            protocol: openai,    role: strong_reasoning }
      glm_5_1:           { id: "glm-5.1",          protocol: openai,    role: premium_reasoning }
      mimo_v2_pro:       { id: "mimo-v2-pro",      protocol: openai,    role: routine_coder }
      mimo_v2_omni:      { id: "mimo-v2-omni",     protocol: openai,    role: routine_coder }
      mimo_v2_5_pro:     { id: "mimo-v2.5-pro",    protocol: openai,    role: strong_reasoning }
      mimo_v2_5:         { id: "mimo-v2.5",        protocol: openai,    role: routine_coder }

  gemini:
    enabled: false
    kind: cli
    description: "Optional. Documentation, tests, summaries."
    auth_env: GEMINI_API_KEY

  codex:
    enabled: false
    kind: cli
    description: "Optional. Alternate worker or reviewer."
    auth_env: null    # ChatGPT Plus OAuth in ~/.codex/auth.json; OPENAI_API_KEY must be unset.

  claude_review:
    enabled: true
    kind: manual
    description: "Claude Code itself, planner/reviewer only. Never used as a routine implementation worker."

# ---------------------------------------------------------------------------
# Lanes — the routing decision Claude makes when calling `oneshot dispatch`.
#
# Default policy (don't override casually):
#   - cheap_fast       -- mechanical work, formatting, lint fixes
#   - cheap_summary    -- summaries, extractions, low-risk transforms
#   - routine_coder    -- DEFAULT for normal bounded implementation
#   - strong_reasoning -- harder refactors, ambiguous failures, cross-file
#   - premium_reasoning-- escalation only; failed-twice or design-sensitive
#   - review_only      -- Claude reviews but does not implement
#
# Use premium_reasoning sparingly. It's the escape hatch, not the default.
# ---------------------------------------------------------------------------
lanes:
  cheap_fast:
    description: "Tiny fixes, lint, formatting, simple tests, trivial docs."
    current_provider: opencode_go
    current_model: deepseek_v4_flash
    future_provider: opencode_go
    future_model: deepseek_v4_flash
    max_diff_lines: 150
    max_files: 5
    allow_architecture_changes: false

  cheap_summary:
    description: "Summaries, notes, extraction, low-risk transforms."
    current_provider: opencode_go
    current_model: qwen_3_5_plus
    future_provider: opencode_go
    future_model: qwen_3_5_plus
    max_diff_lines: 100
    max_files: 5
    allow_architecture_changes: false

  routine_coder:
    description: "Normal bounded implementation and tests. Default lane."
    current_provider: opencode_go
    current_model: minimax_m2_7
    current_runner: opencode_go_claude
    future_provider: opencode_go
    future_model: minimax_m2_7              # Anthropic-compatible → Claude CLI path
    future_runner: opencode_go_claude     # full toolchain via Claude CLI
    max_diff_lines: 500
    max_files: 12
    allow_architecture_changes: false

  strong_reasoning:
    description: "Harder refactors, ambiguous failures, cross-file reasoning."
    current_provider: opencode_go
    current_model: kimi_k2_6
    future_provider: opencode_go
    future_model: kimi_k2_6
    max_diff_lines: 800
    max_files: 20
    allow_architecture_changes: true

  premium_reasoning:
    description: "Escalation only. Failed worker recovery or design-sensitive changes."
    current_provider: opencode_go
    current_model: deepseek_v4_pro
    future_provider: opencode_go
    future_model: deepseek_v4_pro
    max_diff_lines: 1000
    max_files: 25
    allow_architecture_changes: true

  review_only:
    description: "Claude Code reviews but does not implement. No worker dispatched."
    current_provider: claude_review
    current_model: manual
    future_provider: claude_review
    future_model: manual
    max_diff_lines: null
    max_files: null
    allow_architecture_changes: true

# ---------------------------------------------------------------------------
# Runner templates — shell command shapes used to invoke each provider.
#
# {model_id}      -> resolved from providers.<provider>.models.<model>.id
# {task_file}     -> absolute path to .oneshot/tasks/<id>/worker.md
# {worktree_path} -> absolute path to ../oneshot-worktrees/<id>
# {auth_env}      -> NAME of the env var (never the value). The runner sets the
#                    env var from `secrets get` or the shell at invocation time.
#
# ---------------------------------------------------------------------------
runner_templates:
  zai:
    command: "claude -p --dangerously-skip-permissions --model {model_id} \"$(cat {task_file})\""
    cwd: "{worktree_path}"
    auth_env: ZAI_API_KEY
    env:
      ANTHROPIC_BASE_URL: "https://api.z.ai/api/anthropic"
      ANTHROPIC_AUTH_TOKEN: "{auth_value}"
      ANTHROPIC_API_KEY: ""
    readiness:
      - "command -v claude"
      - "secrets get ZAI_API_KEY >/dev/null 2>&1"
    notes:
      - "Uses ANTHROPIC_AUTH_TOKEN (not API_KEY) for ZAI proxy auth"
      - "claude -p gives full tool access with --dangerously-skip-permissions"
  # PATH 1: OpenCode CLI (all models — universal)
  opencode_go:
    command: "opencode run --model opencode-go/{model_id} --dangerously-skip-permissions \"$(cat {task_file})\""
    cwd: "{worktree_path}"
    auth_env: OPENCODE_GO_API_KEY
    readiness:
      - "command -v opencode"
    protocols: [openai, anthropic]
    notes:
      - "Universal path — works with all models."
      - "Requires OpenCode CLI installed."
      - "opencode run takes message as positional arg, not --prompt-file"

  # PATH 2: Claude CLI (MiniMax models only — Anthropic-compatible endpoint)
  opencode_go_claude:
    command: "claude -p --dangerously-skip-permissions --model {model_id} \"$(cat {task_file})\""
    cwd: "{worktree_path}"
    auth_env: OPENCODE_GO_API_KEY
    env:
      ANTHROPIC_BASE_URL: "https://opencode.ai/zen/go/v1/messages"
      ANTHROPIC_API_KEY: "{auth_value}"
    readiness:
      - "command -v claude"
      - "secrets get OPENCODE_GO_API_KEY >/dev/null 2>&1"
    protocols: [anthropic]
    notes:
      - "Same pattern as ZAI runner — Claude CLI with custom base URL."
      - "Full native toolchain (bash, read, edit, glob, grep, git)."
      - "Only works with MiniMax M2.5 and M2.7 (Anthropic-compatible endpoint)."

  # PATH 3: Direct API (all models — OpenAI-compatible)
  opencode_go_api:
    command: "python3 -c \"from core.dispatch.direct_api import call; call('https://opencode.ai/zen/go/v1', '{model_id}', '{task_file}')\""
    cwd: "{worktree_path}"
    auth_env: OPENCODE_GO_API_KEY
    readiness:
      - "secrets get OPENCODE_GO_API_KEY >/dev/null 2>&1"
    protocols: [openai]
    notes:
      - "Lightweight Python helper. No shell access for the model."
      - "Good for summaries, extraction, classification."
  gemini:
    command: "gemini -p @{task_file} --output-format json --approval-mode yolo"
    cwd: "{worktree_path}"
    auth_env: GEMINI_API_KEY
    readiness:
      - "command -v gemini"
      - "gemini -p 'Say READY and nothing else.'"
  gemini_cli_direct:
    command: "gemini -p \"$(cat {task_file})\""
    cwd: "{worktree_path}"
    auth_env: null
    yolo: true
    readiness:
      - "gemini --version"
      - "gemini -p 'Say READY and nothing else.'"
  codex:
    command: "unset OPENAI_API_KEY OPENAI_BASE_URL && codex exec --sandbox danger-full-access --prompt-file {task_file}"
    cwd: "{worktree_path}"
    auth_env: null
    readiness:
      - "command -v codex"
      - "test -s ~/.codex/auth.json"
  codex_cli_direct:
    command: "unset OPENAI_API_KEY OPENAI_BASE_URL && codex exec --sandbox danger-full-access --prompt-file {task_file}"
    cwd: "{worktree_path}"
    auth_env: null
    yolo: true
    readiness:
      - "codex --version"
      - "test -s ~/.codex/auth.json"

# ---------------------------------------------------------------------------
# Search policy — see docs/SEARCH_POLICY.md for the full rules.
# ---------------------------------------------------------------------------
search:
  preferred: argus
  argus:
    enabled: true
    mcp_server_name: argus
    cli_command: "argus search"
  fallback_web_search:
    enabled: false

# ---------------------------------------------------------------------------
# Verification — what `oneshot collect` runs after the worker.
# Set test_command to e.g. "bash scripts/ci.sh" once you trust the harness.
# ---------------------------------------------------------------------------
verification:
  test_command: null
