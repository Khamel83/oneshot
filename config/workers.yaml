workers:
  local:
    host: localhost
    transport: local
    role: planner
    harness: claude_code

  oci:
    host: oci-dev
    transport: ssh
    role: planner
    harness: claude_code

  macmini:
    host: macmini                        # SSH host alias (100.113.216.27 or ~/.ssh/config alias)
    transport: ssh
    role: worker
    harness: opencode
    remote_path: ~/github/oneshot        # abs or ~ path on the remote machine
    ssh_opts: "-o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new"

  homelab:
    host: homelab                        # SSH host alias (100.112.130.100 or ~/.ssh/config alias)
    transport: ssh
    role: worker
    harness: opencode
    remote_path: ~/github/oneshot        # abs or ~ path on the remote machine
    ssh_opts: "-o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new"

  claw:
    host: localhost
    transport: local
    role: worker
    harness: claw_code
    install_path: ~/github/claw-code-agent

  glm:
    host: localhost
    transport: local
    role: worker
    harness: glm_claude          # claude CLI + ZAI backend
    model: glm-5-turbo
    plan_expires: "2026-05-02"   # GLM Coding Plan expiry — reassess or renew before this date

  free:
    host: localhost
    transport: local
    role: worker
    harness: openrouter_api     # direct OpenRouter API call
    model: openrouter/free       # free model router (random selection from free pool)
    cost: 0
    plan_expires: null           # free tier, no expiry
    max_tokens: 1024             # bounded output for background tasks
    timeout: 30                  # 30s timeout — these are quick jobs
