workers:
  local:
    host: localhost
    transport: local
    role: planner
    harness: claude_code

  oci:
    host: oci-ts
    transport: ssh
    role: planner
    harness: claude_code

  macmini:
    host: macmini-ts
    transport: ssh
    role: worker
    harness: opencode

  homelab:
    host: homelab-ts
    transport: ssh
    role: worker
    harness: opencode

  claw:
    host: localhost
    transport: local
    role: worker
    harness: claw_code
    provider: zai
    install_path: ~/github/claw-code-agent

  glm:
    host: localhost
    transport: local
    role: worker
    harness: claude_code
    provider: zai               # WHERE the model runs (was implicit)
    model: glm-5-turbo
    plan_expires: "2026-05-02"

  # OpenCode Go via Claude CLI (MiniMax models — full toolchain)
  ocg_minimax:
    host: localhost
    transport: local
    role: worker
    harness: claude_code         # HOW we invoke
    provider: opencode_go        # WHERE the model runs
    model: minimax-m2.7
    protocol: anthropic
    cost_tier: cheap
    notes:
      - "Claude CLI with ANTHROPIC_BASE_URL → OpenCode Go /messages endpoint"
      - "Full toolchain access. MiniMax models only."

  # OpenCode Go via direct API (all other models — no shell for model)
  ocg_api:
    host: localhost
    transport: local
    role: worker
    harness: direct_api
    provider: opencode_go
    model: deepseek-v4-flash
    protocol: openai
    cost_tier: cheap
    notes:
      - "Direct API calls. No shell access for the model."
      - "Good for summaries, extraction, quick coding tasks."

  free:
    host: localhost
    transport: local
    role: worker
    harness: openrouter_api
    provider: openrouter
    model: openrouter/free
    cost: 0
    plan_expires: null
    max_tokens: 1024
    timeout: 30
