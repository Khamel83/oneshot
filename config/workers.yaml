workers:
  local:
    host: localhost
    transport: local
    role: planner
    harness: claude_code

  oci:
    host: oci-dev
    transport: ssh
    role: planner
    harness: claude_code

  macmini:
    host: macmini
    transport: ssh
    role: worker
    harness: opencode

  homelab:
    host: homelab
    transport: ssh
    role: worker
    harness: opencode

  claw:
    host: localhost
    transport: local
    role: worker
    harness: claw_code
    install_path: ~/github/claw-code-agent

  glm:
    host: localhost
    transport: local
    role: worker
    harness: glm_claude          # claude CLI + ZAI backend
    model: glm-5-turbo
    plan_expires: "2026-05-02"   # GLM Coding Plan expiry — reassess or renew before this date
