lanes:
  premium:
    planner: claude_code
    review_with: claude_code
    worker_pool: [claude_code, codex]
    strategy: first_available
    fallback_lane: null  # top tier, no escalation
    max_parallel: 2

  balanced:
    planner: claude_code
    review_with: claude_code
    worker_pool: [codex, gemini_cli]
    strategy: first_available
    fallback_lane: premium
    max_parallel: 3

  cheap:
    planner: claude_code
    review_with: claude_code
    # Priority: paid-subscription workers first (no extra cost), then free ZAI, then paid APIs
    # gemini_cli: Google AI Pro (paid until EOY 2026)
    # codex: ChatGPT Plus $20/mo
    # glm_claude: ZAI GLM-5-turbo, claude CLI harness, free until 2026-05-02
    # claw_code: last resort — paid OpenRouter APIs
    worker_pool: [gemini_cli, codex, glm_claude, claw_code]
    strategy: first_available
    fallback_lane: balanced
    max_parallel: 3

  research:
    planner: claude_code
    review_with: claude_code
    worker_pool: [gemini_cli, codex]
    search_backend: argus
    strategy: first_available
    fallback_lane: balanced
    max_parallel: 3
